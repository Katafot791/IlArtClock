<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1a">
<title>ILART CLOCK</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
font-family:system-ui;
background:radial-gradient(circle at 20% 30%,#0d1117,#05070a);
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{width:100%;height:100%;padding:12px;display:flex}

.panel{
width:100%;height:100%;
background:rgba(12,18,28,0.65);
backdrop-filter:blur(30px);
border-radius:34px;
padding:18px;
display:flex;
flex-direction:column;
justify-content:space-between;
border:1px solid rgba(255,255,255,0.08);
}

h1{
text-align:center;
font-size:22px;
background:linear-gradient(90deg,#fff,#00f0ff,#b000ff);
-webkit-background-clip:text;
color:transparent;
}

.time{
text-align:center;
font-size:18px;
color:#00f0ff;
text-shadow:0 0 10px #00f0ff;
}

.row{
display:flex;
justify-content:space-between;
font-size:12px;
}

#status{color:#ff5e6e}
#status.ok{color:#00f7b0}

button{
width:100%;
padding:14px;
border-radius:40px;
border:none;
margin-top:8px;
background:rgba(255,255,255,0.05);
color:white;
}

.primary{
background:linear-gradient(90deg,#0066ff,#00c3ff);
font-weight:bold;
}

.active{
background:#00f7b0!important;
color:black!important;
}

input{width:100%;margin-top:6px}

.preview{
height:40px;
border-radius:20px;
margin-top:10px;
box-shadow:0 0 20px #00d4ff;
}
</style>
</head>

<body>

<div class="container">
<div class="panel">

<h1>ILART CLOCK</h1>

<div class="time" id="clock">--:--:--</div>

<div class="row">
<div>BLE: <span id="status">OFFLINE</span></div>
<div id="rssi">○○○○</div>
</div>

<button class="primary" onclick="connect()">CONNECT</button>

<button id="autoBtn" onclick="send('AUTO')">AUTO BRIGHT</button>

<div>
<div>BRIGHT <span id="bVal">50</span></div>
<input type="range" min="5" max="100" value="50"
oninput="bVal.innerText=this.value; send('B'+this.value); save()">
</div>

<div>
<div>CHROMA <span id="cVal">160</span></div>
<input type="range" min="0" max="255" value="160"
oninput="cVal.innerText=this.value; send(this.value); updateHue(this.value); save()">
<div class="preview" id="preview"></div>
</div>

<div>
<div>DOT SPEED</div>
<input type="range" min="500" max="15000" step="500" value="10000"
oninput="send('T'+this.value); save()">
</div>

<button onclick="send('RAINBOW')">RAINBOW</button>
<button onclick="send('SEC')">SECONDS</button>
<button onclick="syncTime()">SYNC TIME</button>

</div>
</div>

<script>

let ch=null;
let dev=null;

let state={
auto:false
};

function save(){
localStorage.setItem("ilart",JSON.stringify(state));
}

function load(){
let s=localStorage.getItem("ilart");
if(s) state=JSON.parse(s);
}

function send(d){
if(!ch) return;
ch.writeValue(new TextEncoder().encode(d));
}

function updateHue(v){
let h=v*360/255;
let c=`hsl(${h},100%,55%)`;
preview.style.background=c;
preview.style.boxShadow=`0 0 20px ${c}`;
}

function syncTime(){
let d=new Date();
let t=
String(d.getHours()).padStart(2,'0')+
String(d.getMinutes()).padStart(2,'0');

send(t);
}

function connect(){
navigator.bluetooth.requestDevice({
filters:[{name:"Ilart_clock"}],
optionalServices:['0000ffe0-0000-1000-8000-00805f9b34fb']
}).then(async d=>{
dev=d;
let s=await d.gatt.connect();
let srv=await s.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
ch=await srv.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

status.innerText="CONNECTED";
status.classList.add("ok");

ch.addEventListener("characteristicvaluechanged",e=>{
let v=new TextDecoder().decode(e.target.value);

if(v=="AUTO_ON"){
autoBtn.classList.add("active");
}
if(v=="AUTO_OFF"){
autoBtn.classList.remove("active");
}
});

d.addEventListener("gattserverdisconnected",()=>{
status.innerText="OFFLINE";
status.classList.remove("ok");
ch=null;
dev=null;
});
});
}

setInterval(()=>{
let d=new Date();
clock.innerText=
String(d.getHours()).padStart(2,'0')+":"+
String(d.getMinutes()).padStart(2,'0')+":"+
String(d.getSeconds()).padStart(2,'0');
},1000);

setInterval(()=>{
let m=["○○○○","●○○○","●●○○","●●●○","●●●●"];
rssi.innerText=m[Math.floor(Math.random()*5)];
},2000);

// auto sync каждые 2 часа
setInterval(()=>{
if(ch) syncTime();
},7200000);

window.onload=()=>{
load();
};

</script>

</body>
</html>
