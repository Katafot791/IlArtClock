<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1a">
<link rel="manifest" href="/IlArtClock/manifest.json">
<title>ILART CLOCK</title>
<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0a0f1a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
#app{width:100%;max-width:420px;padding:16px;}
#status{font-size:14px;margin-bottom:6px}
#clockInfo{font-size:12px;opacity:.6;margin-bottom:12px}
button{width:100%;padding:14px;margin:6px 0;border-radius:30px;border:none}
.splash{
  position:fixed;inset:0;background:#0a0f1a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:22px;z-index:9999;
}
</style>
</head>
<body>

<div id="splash" class="splash">
  ILART CLOCK<br>
  <small>connecting...</small>
</div>

<div id="app">
  <div id="status">OFFLINE</div>
  <div id="clockInfo">CLOCK --:--:-- | last sync: --</div>
  <button onclick="connect()">CONNECT</button>
</div>

<script>
const SERVICE='0000ffe0-0000-1000-8000-00805f9b34fb';
const CHAR='0000ffe1-0000-1000-8000-00805f9b34fb';
const STATE_KEY='ilart_state';

let device=null, characteristic=null;
let lastSync=null;

function saveState(s){localStorage.setItem(STATE_KEY,JSON.stringify(s))}
function loadState(){return JSON.parse(localStorage.getItem(STATE_KEY)||'{}')}

function setStatus(t){document.getElementById('status').innerText=t}
function hideSplash(){document.getElementById('splash').style.display='none'}

function updateClock(){
 if(!lastSync)return;
 const d=new Date();
 const t=new Date(d.getTime());
 document.getElementById('clockInfo').innerText=
  `CLOCK ${t.toTimeString().split(' ')[0]} | synced ${Math.floor((Date.now()-lastSync)/60000)} min ago`;
}
setInterval(updateClock,1000);

async function syncTime(){
 if(!characteristic)return;
 const now=new Date();
 const s=now.getHours().toString().padStart(2,'0')+
         now.getMinutes().toString().padStart(2,'0')+
         now.getSeconds().toString().padStart(2,'0');
 await characteristic.writeValue(new TextEncoder().encode(s));
 lastSync=Date.now();
}

function autoSyncLoop(){
 setInterval(()=>{ if(characteristic && Date.now()-lastSync>7200000) syncTime(); },60000);
}

async function connect(){
 try{
  device=await navigator.bluetooth.requestDevice({
    filters:[{name:'Ilart_clock'}],
    optionalServices:[SERVICE]
  });
  await connectGatt();
 }catch(e){}
}

async function connectGatt(){
 const server=await device.gatt.connect();
 const service=await server.getPrimaryService(SERVICE);
 characteristic=await service.getCharacteristic(CHAR);

 setStatus('CONNECTED');
 hideSplash();
 syncTime();
 restoreState();
 autoSyncLoop();

 device.addEventListener('gattserverdisconnected',()=>{
  setStatus('RECONNECTING...');
  autoReconnect();
 });
}

async function autoReconnect(){
 while(true){
  try{
   await connectGatt();
   break;
  }catch(e){
   await new Promise(r=>setTimeout(r,2000));
  }
 }
}

function restoreState(){
 const s=loadState();
 if(s.auto) characteristic.writeValue(new TextEncoder().encode('AUTO'));
}

navigator.serviceWorker.register('/IlArtClock/sw.js');

window.addEventListener('load',async()=>{
 try{
  const devices=await navigator.bluetooth.getDevices();
  const known=devices.find(d=>d.name==='Ilart_clock');
  if(known){
    device=known;
    await connectGatt();
  }else{
    hideSplash();
  }
 }catch(e){hideSplash();}
});
</script>

</body>
</html>
