<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f1a">

<title>ILART CLOCK</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
font-family: system-ui;
background: radial-gradient(circle at 20% 30%, #0d1117, #05070a);
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:100%;
height:100%;
padding:12px;
display:flex;
}

.panel{
width:100%;
height:100%;
background:rgba(12,18,28,0.65);
border-radius:30px;
padding:18px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

h1{
text-align:center;
font-size:22px;
background:linear-gradient(90deg,#fff,#00f0ff,#b000ff);
-webkit-background-clip:text;
color:transparent;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
font-size:12px;
opacity:0.9;
}

#status{color:#ff5e6e;}
#status.connected{color:#00f7b0;}

button{
padding:12px;
border-radius:30px;
border:none;
background:#1a2233;
color:white;
margin-top:8px;
}

button.primary{
background:linear-gradient(90deg,#0066ff,#00c3ff);
font-weight:bold;
}

.slider{
width:100%;
margin-top:6px;
}

.preview{
height:40px;
border-radius:20px;
margin-top:8px;
background:#00d4ff;
box-shadow:0 0 15px #00d4ff;
}

.small{
font-size:11px;
opacity:0.6;
text-align:center;
margin-top:6px;
}

.auto.active{
background:#00f7b0;
color:black;
}

.time{
text-align:center;
font-size:18px;
margin:8px 0;
}

.rssi{
font-size:12px;
opacity:0.8;
}
</style>
</head>

<body>
<div class="container">
<div class="panel">

<h1>ILART CLOCK</h1>

<div class="time" id="clock">--:--:--</div>

<div class="row">
<div>BLE: <span id="status">OFFLINE</span></div>
<div class="rssi" id="rssi">●○○○</div>
</div>

<button class="primary" id="connectBtn" onclick="connect()">CONNECT</button>

<button id="autoBtn" onclick="toggleAuto()">AUTO</button>

<div>
<div>Brightness <span id="bVal">50</span></div>
<input class="slider" type="range" min="5" max="100" value="50" id="bright">
</div>

<div>
<div>Color <span id="cVal">160</span></div>
<input class="slider" type="range" min="0" max="255" value="160" id="color">
<div class="preview" id="preview"></div>
</div>

<div>
<div>Speed</div>
<input class="slider" type="range" min="500" max="15000" step="500" value="10000" id="speed">
</div>

<button onclick="syncTime()">SYNC TIME</button>

<div class="small">ILART v2 • smart state enabled</div>

</div>
</div>

<script>
let device=null;
let char=null;

let lastSeen=0;

let state={
brightness:50,
color:160,
speed:10000,
auto:false
};

function save(){
localStorage.setItem("ilart",JSON.stringify(state));
}

function load(){
let s=localStorage.getItem("ilart");
if(s) state=JSON.parse(s);
}

function applyUI(){
bright.value=state.brightness;
color.value=state.color;
speed.value=state.speed;

bVal.innerText=state.brightness;
cVal.innerText=state.color;

updateColor(state.color);

if(state.auto) autoBtn.classList.add("active");
}

function updateColor(v){
let hue=v*360/255;
let c=`hsl(${hue},100%,55%)`;
preview.style.background=c;
preview.style.boxShadow=`0 0 20px ${c}`;
}

function send(d){
if(!char) return;
char.writeValue(new TextEncoder().encode(d));
lastSeen=Date.now();
}

function connect(){
navigator.bluetooth.requestDevice({
filters:[{name:"Ilart_clock"}],
optionalServices:['0000ffe0-0000-1000-8000-00805f9b34fb']
}).then(async dev=>{
device=dev;
let server=await dev.gatt.connect();
let service=await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
char=await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

document.getElementById("status").innerText="CONNECTED";
status.classList.add("connected");

dev.addEventListener("gattserverdisconnected",()=>{
status.innerText="OFFLINE";
status.classList.remove("connected");
char=null;
device=null;
});

autoReconnectSave();

}).catch(e=>console.log(e));
}

function autoReconnectSave(){
if(device) localStorage.setItem("deviceSaved","1");
}

async function tryAutoReconnect(){
try{
let devices=await navigator.bluetooth.getDevices();
if(!devices.length) return;

let dev=devices.find(d=>d.name==="Ilart_clock");
if(!dev) return;

let server=await dev.gatt.connect();
device=dev;

let service=await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
char=await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

status.innerText="CONNECTED";
status.classList.add("connected");

}catch(e){}
}

function toggleAuto(){
state.auto=!state.auto;
autoBtn.classList.toggle("active");
send(state.auto?"AUTO_ON":"AUTO_OFF");
save();
}

function syncTime(){
let d=new Date();
let t=
String(d.getHours()).padStart(2,'0')+
String(d.getMinutes()).padStart(2,'0')+
String(d.getSeconds()).padStart(2,'0');

send("TIME:"+t);
}

bright.oninput=e=>{
state.brightness=e.target.value;
bVal.innerText=state.brightness;
send("B"+state.brightness);
save();
};

color.oninput=e=>{
state.color=e.target.value;
cVal.innerText=state.color;
updateColor(state.color);
send("C"+state.color);
save();
};

speed.oninput=e=>{
state.speed=e.target.value;
send("T"+state.speed);
save();
};

setInterval(()=>{
let el=document.getElementById("clock");
let d=new Date();
el.innerText=
String(d.getHours()).padStart(2,'0')+":"+
String(d.getMinutes()).padStart(2,'0')+":"+
String(d.getSeconds()).padStart(2,'0');
},1000);

setInterval(()=>{
let diff=Date.now()-lastSeen;
let lvl=0;
if(diff<2000) lvl=3;
else if(diff<5000) lvl=2;
else if(diff<15000) lvl=1;
else lvl=0;

let map=["○○○○","●○○○","●●○○","●●●○","●●●●"];
rssi.innerText=map[lvl];
},1000);

window.onload=()=>{
load();
applyUI();
tryAutoReconnect();
};
</script>

</body>
</html>
