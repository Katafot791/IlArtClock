<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0f1a">
    <link rel="manifest" href="/IlArtClock/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>ILART | Dark Studio</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html,body{height:100%;width:100%;}
        body{
            font-family:-apple-system,'SF Pro Display','Inter',system-ui,'Helvetica Neue',sans-serif;
            background: radial-gradient(circle at 20% 30%, #0d1117, #05070a);
            display:flex;align-items:stretch;justify-content:stretch;
        }
        .container{width:100%;height:100%;padding:12px;display:flex;flex-direction:column;}
        .glass-panel{
            background:rgba(12,18,28,.65);
            backdrop-filter:blur(32px) saturate(180%);
            border-radius:36px;
            border:1px solid rgba(255,255,255,.08);
            padding:22px 24px 28px;
            height:100%;display:flex;flex-direction:column;justify-content:space-between;
        }
        .logo{text-align:center;margin-bottom:4px;}
        .logo h1{
            font-weight:700;font-size:2rem;
            background:linear-gradient(135deg,#fff,#00f0ff,#b000ff);
            -webkit-background-clip:text;color:transparent;
        }
        .status-row{
            background:rgba(0,0,0,.5);
            border-radius:60px;
            padding:12px 20px;
            display:flex;justify-content:space-between;align-items:center;
            margin-bottom:8px;
        }
        .status-label{font-size:11px;color:#00f0ff;}
        #status{font-weight:600;font-size:12px;color:#ff5e6e;}
        #clockInfo{text-align:center;font-size:12px;opacity:.6;margin-bottom:10px}
        button{
            width:100%;padding:14px 18px;border-radius:44px;border:none;
            font-weight:600;font-size:15px;margin:6px 0;
        }
        button:active{transform:scale(.97)}
        .btn-connect{
            background:linear-gradient(105deg,#0066ff,#00c3ff);
            font-weight:700;font-size:16px;padding:16px;margin-bottom:8px;
        }
        .btn-sync{
            background:rgba(0,247,176,.08);
            border:1px solid rgba(0,247,176,.3);
            color:#00f7b0;
        }
        #btn-auto.active{
            background:rgba(0,247,176,.2);
            border:1px solid #00f7b0;
            color:#00f7b0;
            box-shadow:0 0 15px #00f7b0;
        }
        .double-buttons{display:flex;gap:12px;margin:8px 0 12px;}
        .double-buttons button{flex:1;margin:0;padding:12px}
        .control-group{margin:12px 0;}
        .control-header{
            display:flex;justify-content:space-between;
            font-size:13px;color:#b0c4ff;margin-bottom:8px;
        }
        input[type="range"]{
            width:100%;height:5px;border-radius:10px;
            background:rgba(255,255,255,.12);outline:none;
        }
        .preview-bar{
            height:52px;border-radius:32px;margin-top:12px;
            border:1px solid rgba(255,255,255,.15);
        }
        .action-grid{display:flex;gap:14px;margin:14px 0;}
        .action-grid button{flex:1}
        .speed-section{margin-top:12px}
        hr{
            border:none;height:1px;
            background:linear-gradient(90deg,transparent,#00f0ff,#b000ff,transparent);
            margin:18px 0 14px;
        }
        .footer-note{text-align:center;font-size:10px;opacity:.45;color:#88aaff;margin-top:6px}
    .install-btn{
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #00f0ff;
    color: #0a0f1a;
    border: none;
    border-radius: 40px;
    padding: 12px 24px;
    font-weight: bold;
    font-size: 14px;
    z-index: 9999;
    box-shadow: 0 0 20px #00f0ff;
    cursor: pointer;
}
    </style>
</head>
<body>
<div class="container">
<div class="glass-panel">

<div class="logo">
    <h1>ILART<span> CLOCK</span></h1>
</div>

<div class="status-row">
    <span class="status-label">⚡ BLE</span>
    <span id="status">OFFLINE</span>
</div>

<div id="clockInfo">CLOCK --:--:-- | last sync: --</div>

<button id="main-connect" class="btn-connect" onclick="connect()">🔗 CONNECT DEVICE</button>

<div class="double-buttons">
    <button class="btn-sync" onclick="syncTime()">🔄 SYNC TIME</button>
    <button id="btn-auto" onclick="toggleAuto()">🌙 AUTO BRIGHT</button>
</div>

<div class="control-group">
    <div class="control-header">
        <span>💡 BRIGHTNESS</span>
        <span id="brightnessValue">50%</span>
    </div>
    <input type="range" id="brightnessSlider" min="5" max="100" value="50">
</div>

<div class="control-group">
    <div class="control-header">
        <span>🎨 CHROMA</span>
        <span id="hueValue">160</span>
    </div>
    <input type="range" id="colorSlider" min="0" max="255" value="160">
    <div id="preview" class="preview-bar"></div>
</div>

<div class="action-grid">
    <button onclick="send('RAINBOW')">🌈 RAINBOW</button>
    <button onclick="send('SEC')">⏱️ SECONDS</button>
</div>

<div class="speed-section">
    <div class="control-header">
        <span>🌀 DOT SPEED</span>
        <span id="speedValue">10.0 s</span>
    </div>
    <input type="range" id="speedSlider" min="500" max="15000" step="500" value="10000" dir="rtl">
</div>

<hr>
<div class="footer-note">ILART PROTOCOL | NEO DARK</div>

</div>
</div>

<script>
let device=null, characteristic=null;
const STATE_KEY='ilart_state';
let deferredPrompt = null;

window.('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    const installBtn = document.createElement('button');
    installBtn.textContent = '📱 INSTALL APP';
    installBtn.className = 'install-btn';

    installBtn.onclick = async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.style.display = 'none';
            }
            deferredPrompt = null;
        }
    };

    document.body.appendChild(installBtn);
});

    
let lastSyncTime=0;
    function saveState(s){
    localStorage.setItem(STATE_KEY, JSON.stringify(s));
}
function loadState(){
    return JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
}

function updateClockInfo(){
    if(!lastSyncTime){
        document.getElementById('clockInfo').innerText =
            'CLOCK --:--:-- | not synced yet';
        return;
    }

    const clockNow = new Date(lastSyncTime + (Date.now() - lastSyncTime));

    const t = clockNow.toTimeString().split(' ')[0];
    const mins = Math.floor((Date.now()-lastSyncTime)/60000);

    document.getElementById('clockInfo').innerText =
        `CLOCK ${t} | synced ${mins} min ago`;
}
setInterval(updateClockInfo,1000);

// автосинхронизация каждые 2 часа
setInterval(()=>{
    if(characteristic) syncTime();
},7200000);


async function send(data){
    if(!characteristic || !device.gatt.connected) return;

    const t0 = performance.now();
    await characteristic.writeValue(new TextEncoder().encode(data));
    const dt = performance.now() - t0;

    let bars='●○○○';
    if(dt<80) bars='●●●●';
    else if(dt<150) bars='●●●○';
    else if(dt<300) bars='●●○○';

    const s = document.getElementById('status');
    s.innerText = `CONNECTED ${bars}`;
    s.style.color = "#00f7b0";
}

function syncTime(){
    if(!characteristic || !device.gatt.connected) return;
    const now = new Date();
    const str =
        now.getHours().toString().padStart(2,'0')+
        now.getMinutes().toString().padStart(2,'0')+
        now.getSeconds().toString().padStart(2,'0');
    send(str);
    lastSyncTime = Date.now();
}

function toggleAuto(){
    send('AUTO');
    document.getElementById('btn-auto').classList.add('active');
    saveState({...loadState(), auto:true});
}

function restoreState(){
    const s = loadState();
    if(s.brightness) send('B'+s.brightness);
    if(s.hue) send(String(s.hue));
    if(s.speed) send('T'+s.speed);
    if(s.auto){
        send('AUTO');
        document.getElementById('btn-auto').classList.add('active');
    }
}
    async function connect(){
    try{
        device = await navigator.bluetooth.requestDevice({
            filters:[{name:'Ilart_clock'}],
            optionalServices:['0000ffe0-0000-1000-8000-00805f9b34fb']
        });

        await startConnection();

    }catch(e){
        alert("Connection failed. Make sure the clock is nearby.");
    }
}

async function startConnection(){
    //if(device.gatt.connected) return;
    if (device.gatt.connected) {
    await device.gatt.disconnect();
}
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
    characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

    document.getElementById('status').innerText = "CONNECTED";
    document.getElementById('status').style.color = "#00f7b0";
    document.getElementById('main-connect').style.display = "none";

    restoreState();
    syncTime();

    device.('gattserverdisconnected', ()=>{
    characteristic = null;   // ВАЖНО
    document.getElementById('status').innerText = "RECONNECTING...";
    autoReconnect();
}, { once:true }); // ВАЖНО
}

async function autoReconnect(){
    while(true){
        try{
            const devices = await navigator.bluetooth.getDevices();
            const known = devices.find(d=>d.name==='Ilart_clock');

            if(known){
                device = known;              // ← НОВЫЙ device
                await startConnection();     // ← Новый GATT
                return;
            }
        }catch(e){}

        await new Promise(r=>setTimeout(r,2000));
    }
}

// автоподключение без кнопки
window.('load', async ()=>{
    try{
        const devices = await navigator.bluetooth.getDevices();
        const known = devices.find(d=>d.name==='Ilart_clock');
        if(known){
            device = known;
            autoReconnect();
        }
    }catch{}
});
    function updateBrightnessLabel(val){
    document.getElementById('brightnessValue').innerText = val + '%';
}
function updateSpeedLabel(val){
    document.getElementById('speedValue').innerText = (val/1000).toFixed(1)+' s';
}
function updateUI(hueValue){
    const hueDeg = (hueValue * 360 / 255);
    const color = `hsl(${hueDeg},100%,58%)`;
    const p = document.getElementById('preview');
    p.style.background = color;
    p.style.boxShadow = `0 0 24px ${color}`;
    document.getElementById('hueValue').innerText = hueValue;
}

document.('DOMContentLoaded', ()=>{
    const b = document.getElementById('brightnessSlider');
    const c = document.getElementById('colorSlider');
    const s = document.getElementById('speedSlider');

    updateBrightnessLabel(b.value);
    updateUI(c.value);
    updateSpeedLabel(s.value);

    b.('input', e=>{
        const v = e.target.value;
        updateBrightnessLabel(v);
        send('B'+v);
        saveState({...loadState(), brightness:v});
        document.getElementById('btn-auto').classList.remove('active');
    });

    c.('input', e=>{
        const v = e.target.value;
        updateUI(v);
        send(String(v));
        saveState({...loadState(), hue:v});
        document.getElementById('btn-auto').classList.remove('active');
    });

    s.('input', e=>{
        const v = e.target.value;
        updateSpeedLabel(v);
        send('T'+v);
        saveState({...loadState(), speed:v});
    });
});
    </script>
</body>
</html>
